<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Heeth</title>
<link rel="icon" type="image/png" href="favicon.png">
<script>
// notes.js 캐시 버스터: 분 단위 버전 쿼리로 오래된 캐시 회피
window.__heeNotesPromise = new Promise(function(resolve){
  var bust = Math.floor(Date.now() / 60000);
  var s = document.createElement('script');
  s.src = 'notes.js?v=' + bust;
  s.onload  = function(){ resolve(); };
  s.onerror = function(){ this.remove(); resolve(); };
  document.head.appendChild(s);
});
</script>
<style>
  html {
    overflow-y: scroll;
    scrollbar-gutter: stable;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  html, body {
    background: #ffffff;
    color: #000;
    margin: 0;
    padding: 0;
    font-family: "Times New Roman", Times, serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    max-width: 780px;
    margin: 0 auto;
    padding: 1.2em 1.2em 3em 1.2em;
    /* 아이폰 노치/다이나믹 아일랜드 — 가로 safe area */
    padding-left: max(1.2em, env(safe-area-inset-left));
    padding-right: max(1.2em, env(safe-area-inset-right));
    overflow-x: hidden;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  h1 {
    font-size: 2.2em;
    margin: 0 0 0.1em 0;
    font-weight: bold;
  }
  h2 {
    font-size: 1.3em;
    margin: 1.2em 0 0.4em 0;
  }
  p { margin: 0.4em 0; }

  a, a:link, a:visited {
    color: #000;
    text-decoration: none;
    -webkit-tap-highlight-color: rgba(180, 204, 197, 0.25);
  }
  /* 포인터가 실제로 hover를 지원하는 환경(데스크톱)에서만 hover 색 적용 */
  @media (hover: hover) {
    a:hover { color: #b4ccc5; }
  }
  a:active { color: #b4ccc5; }

  .profile-sketch {
    margin: 0.4em 0 0.6em 0;
  }
  .profile-sketch img {
    max-width: 180px;
    width: 100%;
    height: auto;
    display: block;
  }

  .inline-nav {
    margin: 0.8em 0 0.6em 0;
  }

  .icon-links {
    margin-left: 0.6em;
    font-size: 0.95em;
  }
  .icon-links a {
    text-decoration: none;
    margin-right: 0.35em;
  }
  .icon-links a:last-child {
    margin-right: 0;
  }
  .icon-links svg {
    vertical-align: -0.25em;
  }

  ul {
    margin: 0.4em 0 0.6em 0;
    padding-left: 1.6em;
  }
  li { margin: 0.2em 0; }

  hr {
    border: none;
    border-top: 1px solid #666;
    margin: 1.4em 0;
  }
  hr.nav-rule {
    width: 720px;  /* JS가 로드 후 실제 갤러리 폭으로 덮어씀 */
    max-width: 100%;
    margin: 0.6em 0 0.6em 0;
  }

  /* 클릭 시 나타나는 섹션 — 기본 숨김, JS가 표시를 제어 */
  .panel {
    display: none;
    box-sizing: border-box;
    overflow-wrap: break-word;
  }
  .panel.open {
    display: block;
  }
  .panel img,
  .panel iframe {
    max-width: 100%;
  }

  #notes-reader {
    margin-top: 1.2em;
    padding-top: 0.8em;
    border-top: 1px dashed #ccc;
    display: none;
  }
  #notes-reader.active { display: block; }
  #notes-reader .entry-title {
    font-size: 1.2em;
    font-weight: bold;
    margin: 0.3em 0 0.2em 0;
  }
  #notes-reader .entry-date {
    color: #666;
    margin-bottom: 0.6em;
  }
  #notes-reader .entry-body img {
    width: 500px;
    height: 500px;
    max-width: 100%;
    object-fit: cover;
    border: 2px solid #000;
    margin: 0.5em 0;
    display: block;
    background: #fff;
  }
  #notes-reader .entry-body iframe {
    max-width: 100%;
    margin: 0.5em 0;
    display: block;
    border: 2px solid #000;
  }
  #notes-reader .entry-body p { margin: 0.5em 0; }

  .new-badge {
    display: inline-block;
    background: #fff8c4;
    color: #666;
    font-size: 0.55em;
    font-weight: bold;
    padding: 0 4px;
    margin-left: 0.35em;
    border: 1px solid #ede7a8;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }

  ul.gallery-label {
    margin: 0.6em 0 0.2em 0;
  }
  ul.gallery-label li { margin: 0; }
  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 720px;
    margin: 0.4em 0 0.8em 0;
  }
  .gallery img {
    width: 100%;
    height: auto;
    border: 2px solid #000;
    background: #fff;
    margin: 0;
    box-sizing: border-box;
    display: block;
  }
  .gallery .placeholder {
    width: 100%;
    aspect-ratio: 4 / 3;
    border: 2px dashed #888;
    background: #f0f0f0;
    color: #555;
    text-align: center;
    font-size: 0.85em;
    margin: 0;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ==================== 모바일 대응 ==================== */
  @media (max-width: 640px) {
    html, body {
      font-size: 17px;
    }
    body {
      padding: 1em 1em 2.5em 1em;
      padding-left: max(1em, env(safe-area-inset-left));
      padding-right: max(1em, env(safe-area-inset-right));
    }
    h1 {
      font-size: 1.9em;
    }
    h2 {
      font-size: 1.2em;
    }
    .inline-nav {
      margin: 1em 0 0.6em 0;
      line-height: 2.1;  /* 모바일에서 링크 탭 영역 확보 + 줄바꿈 시 여유 */
    }
    .inline-nav a {
      padding: 0.15em 0.1em;  /* 탭 타겟 살짝 확장 */
    }
    .icon-links {
      display: inline-block;  /* 좁은 화면에서 줄이 바뀌어도 아이콘 2개는 붙어있게 */
      white-space: nowrap;
    }
    ul {
      padding-left: 1.3em;
    }
    #notes-reader .entry-title {
      font-size: 1.1em;
    }
    #notes-reader .entry-body img {
      width: 100%;
      height: auto;
      max-height: 70vh;
      object-fit: contain;
    }
    #notes-reader .entry-body iframe {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
    }
    .gallery {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      max-width: 100%;
    }
  }

  /* 아주 좁은 화면(iPhone SE 세로 등) — 1열로 전환 */
  @media (max-width: 360px) {
    .gallery {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<h1><a href="#">Heeth</a></h1>
<p class="profile-sketch">
  <img src="images/profile-sketch.svg" alt="" onerror="this.style.display='none';">
</p>
<p>인형을 만들고, 그림을 그리고, 좋은 음악과 재미난 이야기를 좋아합니다.</p>
<p class="inline-nav">
[ <a href="#notes">Notes</a> |
<a href="#gallery">Gallery</a> |
<a href="#friends">Friends</a> ]
<span class="icon-links">
  <a id="email-link" href="#" data-u="nhs84kr" data-d="naver.com" title="이메일" aria-label="이메일 보내기"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0l-8 5-8-5h16zm0 12H4V8.4l7.47 4.67a1 1 0 0 0 1.06 0L20 8.4V18z"/></svg></a>
  <a href="https://x.com/heeth_n" target="_blank" rel="noopener noreferrer" title="Twitter" aria-label="Twitter"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg></a>
</span>
</p>

<hr class="nav-rule">

<!-- ==================== Notes (read-only) ==================== -->
<div id="notes" class="panel">
  <h2>Notes</h2>
  <div id="notes-list"></div>
  <div id="notes-reader"></div>
</div>

<!-- ==================== Gallery ==================== -->
<div id="gallery" class="panel">
  <h2>Gallery</h2>
  <ul class="gallery-label"><li>Dolls</li></ul>
  <div class="gallery">
    <img src="images/doll-01.jpg" alt="Doll 1" onerror="this.outerHTML='<span class=\'placeholder\'>doll-01.jpg</span>'">
    <img src="images/doll-02.jpg" alt="Doll 2" onerror="this.outerHTML='<span class=\'placeholder\'>doll-02.jpg</span>'">
    <img src="images/doll-03.jpg" alt="Doll 3" onerror="this.outerHTML='<span class=\'placeholder\'>doll-03.jpg</span>'">
    <img src="images/doll-04.jpg" alt="Doll 4" onerror="this.outerHTML='<span class=\'placeholder\'>doll-04.jpg</span>'">
    <img src="images/doll-05.jpg" alt="Doll 5" onerror="this.outerHTML='<span class=\'placeholder\'>doll-05.jpg</span>'">
    <img src="images/doll-06.jpg" alt="Doll 6" onerror="this.outerHTML='<span class=\'placeholder\'>doll-06.jpg</span>'">
  </div>
  <ul class="gallery-label"><li>Drawings</li></ul>
  <div class="gallery">
    <img src="images/drawing-01.jpg" alt="Drawing 1" onerror="this.outerHTML='<span class=\'placeholder\'>drawing-01.jpg</span>'">
    <img src="images/drawing-02.jpg" alt="Drawing 2" onerror="this.outerHTML='<span class=\'placeholder\'>drawing-02.jpg</span>'">
    <img src="images/drawing-03.jpg" alt="Drawing 3" onerror="this.outerHTML='<span class=\'placeholder\'>drawing-03.jpg</span>'">
  </div>
</div>

<!-- ==================== Friends ==================== -->
<div id="friends" class="panel">
  <h2>Friends</h2>
  <ul>
    <li><a href="https://nachiketa3299.github.io/RUB/" target="_blank" rel="noopener noreferrer">RZN</a> — 남자친구</li>
    <li><a href="https://luminari.uk" target="_blank" rel="noopener noreferrer">Dabin Yim</a> — 멋쟁이 해커</li>
  </ul>
</div>

<script>
(function(){
  var STORAGE_KEY = 'hee-diary-entries';

  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function loadEntries(){
    // 1) localStorage에 일기가 있으면 그게 진짜 최신 (로컬 편집 환경)
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var arr = JSON.parse(raw);
        if (Array.isArray(arr) && arr.length > 0) return arr;
      }
    } catch(e) {}
    // 2) 그게 없으면 notes.js가 심어둔 데이터 (호스팅 환경)
    if (window.HEE_NOTES && Array.isArray(window.HEE_NOTES)) {
      return window.HEE_NOTES;
    }
    return [];
  }

  function renderNotesList(){
    var entries = loadEntries().slice();
    entries.sort(function(a, b){
      var da = a.date || '', db = b.date || '';
      if (da !== db) return db.localeCompare(da);
      return (b.updatedAt || '').localeCompare(a.updatedAt || '');
    });
    var listEl = $('notes-list');
    if (entries.length === 0) {
      listEl.innerHTML = '<p><i>아직 일기가 없습니다.</i></p>';
      return;
    }
    var html = '<ul>';
    entries.forEach(function(e, i){
      var label = (e.date ? '[' + esc(e.date) + '] ' : '') + esc(e.title || '제목 없음');
      var badge = (i < 2) ? ' <span class="new-badge">NEW</span>' : '';
      html += '<li><a href="#notes" data-read="' + e.id + '">' + label + '</a>' + badge + '</li>';
    });
    html += '</ul>';
    listEl.innerHTML = html;
  }

  function showList(){
    $('notes-list').style.display = '';
    var reader = $('notes-reader');
    reader.classList.remove('active');
    reader.innerHTML = '';
  }

  function fixYoutubeEmbeds(body){
    // YouTube embed error 153 회피:
    //  1) 기존 youtube.com/embed → youtube-nocookie.com/embed
    //  2) youtube-nocookie 포함한 모든 YT iframe에 referrerpolicy 속성 주입 (없을 때만)
    if (!body) return body;
    var out = body.replace(/https?:\/\/(?:www\.)?youtube\.com\/embed\//g,
                           'https://www.youtube-nocookie.com/embed/');
    out = out.replace(/<iframe\b([^>]*?)\bsrc="(https?:\/\/(?:www\.)?youtube(?:-nocookie)?\.com\/embed\/[^"]*)"([^>]*)>/gi,
      function(match, pre, src, post){
        var attrs = pre + post;
        if (/\breferrerpolicy\s*=/i.test(attrs)) return match; // 이미 있음
        return '<iframe' + pre + 'src="' + src + '" referrerpolicy="strict-origin-when-cross-origin"' + post + '>';
      });
    return out;
  }

  function renderReader(id){
    var reader = $('notes-reader');
    if (!id) { showList(); return; }
    var entries = loadEntries();
    var entry = null;
    for (var i=0; i<entries.length; i++) if (entries[i].id === id) { entry = entries[i]; break; }
    if (!entry) { showList(); return; }
    var html = '';
    html += '<div class="entry-title">' + esc(entry.title || '제목 없음') + '</div>';
    html += '<div class="entry-date">' + esc(entry.date || '') + '</div>';
    html += '<div class="entry-body">' + fixYoutubeEmbeds(entry.body || '') + '</div>';
    html += '<p style="margin:1.5em 0 0 0;"><a href="#notes" id="btn-reader-back">← 목록으로</a></p>';
    reader.innerHTML = html;
    reader.classList.add('active');
    $('notes-list').style.display = 'none';
    $('btn-reader-back').addEventListener('click', function(e){
      e.preventDefault();
      renderReader(null);
    });
  }

  function scrollTop(){
    window.scrollTo(0, 0);
  }

  function alignNavRule(){
    var rule = document.querySelector('hr.nav-rule');
    var panel = document.getElementById('gallery');
    if (!rule || !panel) return;

    // 측정 시 패널을 잠깐 .open 으로 켠다. JS가 동기 실행되므로 add → 측정 → remove
    // 사이에는 브라우저가 paint하지 않아 깜빡임 없음. position 조작은 하지 않음
    // (position:absolute 로 빼면 grid 컨테이너가 shrink-to-fit 되어 측정값이 망가짐).
    var wasOpen = panel.classList.contains('open');
    if (!wasOpen) panel.classList.add('open');

    var items = panel.querySelectorAll('.gallery img, .gallery .placeholder');
    var panelRect = panel.getBoundingClientRect();
    var maxRight = 0;
    items.forEach(function(el){
      var r = el.getBoundingClientRect();
      var right = r.right - panelRect.left;
      if (right > maxRight) maxRight = right;
    });

    if (!wasOpen) panel.classList.remove('open');

    // 안전장치: 비정상적으로 작은 값이면 무시 (이미지 로드 전이거나 측정 실패)
    if (maxRight < 120) return;

    var w = Math.round(maxRight) + 'px';
    rule.style.width = w;
    // 모든 패널(Notes / Gallery / Friends)도 가로바 폭을 넘지 않도록 제한
    document.querySelectorAll('.panel').forEach(function(p){
      p.style.maxWidth = w;
    });
  }

  function showPanel(name){
    // name: 'notes' | 'gallery' | 'friends' | null (모두 닫기)
    document.querySelectorAll('.panel').forEach(function(p){
      if (p.id === name) p.classList.add('open');
      else p.classList.remove('open');
    });
    // Notes 패널을 다시 열 때는 항상 목록 상태로 초기화
    if (name === 'notes') showList();
    scrollTop();
  }

  function setupEmailLink(){
    var el = $('email-link');
    if (!el) return;
    var u = el.getAttribute('data-u');
    var d = el.getAttribute('data-d');
    if (!u || !d) return;
    el.setAttribute('href', 'mailto:' + u + '@' + d);
    el.removeAttribute('data-u');
    el.removeAttribute('data-d');
  }

  function init(){
    setupEmailLink();
    renderNotesList();
    alignNavRule();
    window.addEventListener('load', alignNavRule);
    window.addEventListener('resize', alignNavRule);

    $('notes-list').addEventListener('click', function(e){
      var t = e.target;
      while (t && t !== this && !(t.dataset && t.dataset.read)) t = t.parentNode;
      if (!t || t === this) return;
      if (t.dataset && t.dataset.read) {
        e.preventDefault();
        renderReader(t.dataset.read);
        scrollTop();
      }
    });

    // Notes / Gallery / Friends 링크 — JS로 패널 전환 (해시 변경 없음)
    // 주의: .inline-nav 안에 이메일/트위터 아이콘 링크도 있으므로 href 확인 후에만 가로챈다
    document.querySelectorAll('.inline-nav a').forEach(function(a){
      a.addEventListener('click', function(e){
        var href = a.getAttribute('href') || '';
        if (href === '#notes') {
          e.preventDefault();
          showPanel('notes');
        } else if (href === '#gallery') {
          e.preventDefault();
          showPanel('gallery');
        } else if (href === '#friends') {
          e.preventDefault();
          showPanel('friends');
        }
        // 그 외(mailto:, https://x.com/…)는 기본 동작 그대로
      });
    });

    // Heeth (홈) 링크 — 모든 패널 닫고 맨 위로
    var home = document.querySelector('h1 a');
    if (home) {
      home.addEventListener('click', function(e){
        e.preventDefault();
        showPanel(null);
      });
    }
  }

  function start(){
    // __heeNotesPromise는 head의 인라인 스크립트가 항상 심어둔다
    if (window.__heeNotesPromise) window.__heeNotesPromise.then(init);
    else init();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>

</body>
</html>
